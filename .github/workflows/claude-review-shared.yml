name: Claude Code Review (Shared)

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          direct_prompt: |
            Review this pull request. Focus on bugs, security vulnerabilities,
            and logic errors. Read the actual code before flagging anything.
            Be precise and actionable. False positives waste developer time.

            Privacy: Never quote secrets, credentials, API keys, tokens, or
            personally identifiable information in your review comments.
            Flag the issue and its location, but do not reproduce the
            sensitive value in the comment.

          use_sticky_comment: true
